<!DOCTYPE html>
<html>
  <head>
    <title>General Knowledge Exam</title>
    <link rel="stylesheet" href="/static/exam.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 0;
        padding: 20px;
      }
      #timer {
        position: fixed;
        top: 10px;
        right: 20px;
        font-size: 18px;
        font-weight: bold;
        background: #222;
        color: #fff;
        padding: 6px 12px;
        border-radius: 8px;
      }
      #camera-box {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }
      #examCamera {
        width: 280px;
        height: 200px;
        border: 2px solid #333;
        border-radius: 10px;
        background: black;
      }
    </style>
  </head>
  <body>
    <div id="timer"></div>

    <h2 style="text-align: center; margin-top: 60px">General Knowledge Exam</h2>

    <!-- Camera Display -->
    <div id="camera-box">
      <video id="examCamera" autoplay playsinline muted></video>
    </div>

    <form id="examForm" method="POST" action="{{ url_for('result') }}">
      <div class="question">
        <p>1. What is the capital of India?</p>
        <label><input type="radio" name="q1" value="Mumbai" /> Mumbai</label
        ><br />
        <label
          ><input type="radio" name="q1" value="New Delhi" /> New Delhi</label
        ><br />
        <label><input type="radio" name="q1" value="Kolkata" /> Kolkata</label
        ><br />
      </div>

      <div class="question">
        <p>2. Who is known as the Father of the Nation in India?</p>
        <label
          ><input type="radio" name="q2" value="Jawaharlal Nehru" /> Jawaharlal
          Nehru</label
        ><br />
        <label
          ><input type="radio" name="q2" value="Mahatma Gandhi" /> Mahatma
          Gandhi</label
        ><br />
        <label
          ><input type="radio" name="q2" value="Subhash Chandra Bose" /> Subhash
          Chandra Bose</label
        ><br />
      </div>

      <div class="question">
        <p>3. Which is the largest ocean in the world?</p>
        <label
          ><input type="radio" name="q3" value="Indian Ocean" /> Indian
          Ocean</label
        ><br />
        <label
          ><input type="radio" name="q3" value="Pacific Ocean" /> Pacific
          Ocean</label
        ><br />
        <label
          ><input type="radio" name="q3" value="Atlantic Ocean" /> Atlantic
          Ocean</label
        ><br />
      </div>

      <div class="question">
        <p>4. Which planet is known as the Red Planet?</p>
        <label><input type="radio" name="q4" value="Jupiter" /> Jupiter</label
        ><br />
        <label><input type="radio" name="q4" value="Mars" /> Mars</label><br />
        <label><input type="radio" name="q4" value="Venus" /> Venus</label
        ><br />
      </div>

      <div class="question">
        <p>5. Which is the largest rainforest in the world?</p>
        <label><input type="radio" name="q5" value="Congo" /> Congo</label
        ><br />
        <label><input type="radio" name="q5" value="Amazon" /> Amazon</label
        ><br />
        <label
          ><input type="radio" name="q5" value="Sundarbans" /> Sundarbans</label
        ><br />
      </div>

      <div style="margin-top: 18px">
        <button type="submit">Submit Exam</button>
      </div>
    </form>

    <script>
      // ---- Disable right-click ----
      document.addEventListener("contextmenu", (e) => e.preventDefault());

      // ---- Disable copy/paste/cut/select ----
      document.addEventListener("copy", (e) => e.preventDefault());
      document.addEventListener("paste", (e) => e.preventDefault());
      document.addEventListener("cut", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());

      // ---- Auto-submit on tab switch ----
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          document.getElementById("examForm").submit();
        }
      });

      // ---- Timer (top-right countdown) ----
      let timeLeft = 300; // seconds (5 min)
      function startTimer() {
        const el = document.getElementById("timer");
        const t = setInterval(() => {
          let m = Math.floor(timeLeft / 60);
          let s = timeLeft % 60;
          el.textContent =
            "Time Left: " + m + "m " + (s < 10 ? "0" + s : s) + "s";
          if (timeLeft <= 0) {
            clearInterval(t);
            document.getElementById("examForm").submit();
          }
          timeLeft--;
        }, 1000);
      }
      startTimer();

      // ---- Camera start helper ----
      async function startCamera() {
        const video = document.getElementById("examCamera");
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
          });
          video.srcObject = stream;
          return video;
        } catch (err) {
          document.getElementById("examForm").submit();
        }
      }

      // ---- Object detection (COCO-SSD with electronics) ----
      async function startObjectDetection(videoEl) {
        const model = await cocoSsd.load();
        setInterval(async () => {
          try {
            const preds = await model.detect(videoEl);

            // List of electronics in COCO-SSD
            const restrictedItems = [
              "cell phone",
              "laptop",
              "tv",
              "remote",
              "keyboard",
              "mouse",
              "microwave",
              "refrigerator",
            ];

            const restricted = preds.some((p) =>
              restrictedItems.includes(p.class)
            );
            const personCount = preds.filter(
              (p) => p.class === "person"
            ).length;

            if (restricted || personCount > 1) {
              document.getElementById("examForm").submit();
            }
          } catch (e) {
            // ignore errors
          }
        }, 2000);
      }

      // ---- Start everything ----
      (async () => {
        const v = await startCamera();
        if (v) startObjectDetection(v);
      })();
    </script>
  </body>
</html>
